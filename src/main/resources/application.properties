# Tells Spring to give up faster if the DB isn't responding (20 seconds instead of default 30+)
spring.datasource.hikari.connection-timeout=20000

# Keeps the pool small so we don't overwhelm the free database
spring.datasource.hikari.maximum-pool-size=5

# Tells Spring to recycle connections every 10 minutes BEFORE Aiven drops them
spring.datasource.hikari.max-lifetime=600000

# Tests if the connection is actually alive before sending your query
spring.datasource.hikari.keepalive-time=300000